version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: powergrid-postgres
    environment:
      POSTGRES_USER: powergrid
      POSTGRES_PASSWORD: powergrid
      POSTGRES_DB: powergrid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U powergrid -d powergrid" ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
